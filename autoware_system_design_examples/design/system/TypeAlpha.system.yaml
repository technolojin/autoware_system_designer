autoware_system_design_format: 0.3.0

name: TypeAlpha.system

variables:
  - name: vehicle_id
  - name: data_path
  - name: lanelet2_map_file
  - name: pointcloud_map_file

variable_files: []

modes:
  - name: default
    description: Default mode
    default: true
  - name: simulation
    description: Simulation mode

components:
  - name: lidar
    entity: LidarDummy.module
    namespace: sensing/lidar
    compute_unit: perception_ecu_1
  - name: map_loader
    entity: MapDummy.node
    namespace: map
    compute_unit: dummy_ecu_1
  - name: localizer
    entity: LocalizationDummy.node
    namespace: localization
    compute_unit: dummy_ecu_1
  - name: object_recognition
    entity: PerceptionA.module
    namespace: perception/object_recognition
    compute_unit: main_ecu
    parameter_set: [PerceptionModuleA.parameter_set]
  - name: planner
    entity: PlanningDummy.node
    namespace: planning
    compute_unit: dummy_ecu_2

connections:
  - - object_recognition.subscriber.pointcloud
    - lidar.publisher.concatenated/pointcloud
  - - map_loader.publisher.vector_map
    - planner.subscriber.lanelet_map
  - - object_recognition.publisher.objects
    - planner.subscriber.predicted_objects
  - - lidar.publisher.concatenated/pointcloud
    - localizer.subscriber.pointcloud
  - - map_loader.publisher.vector_map
    - localizer.subscriber.lanelet_map
  - - object_recognition.subscriber.vector_map
    - map_loader.publisher.vector_map

simulation:
  override:
    components:
      - name: object_recognition
        entity: PerceptionB.module
        namespace: perception/object_recognition
        compute_unit: main_ecu
        parameter_set: [PerceptionModuleABuild.parameter_set]
