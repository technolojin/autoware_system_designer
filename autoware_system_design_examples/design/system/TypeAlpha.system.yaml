autoware_system_design_format: 0.3.1

name: TypeAlpha.system

variables:
  - name: vehicle_id
  - name: data_path
  - name: lanelet2_map_file
  - name: pointcloud_map_file

variable_files: []

modes:
  - name: default
    description: Default mode
    default: true
  - name: simulation
    description: Simulation mode

components:
  - name: lidar
    entity: LidarDummy.module
    path: /sensing/lidar
    compute_unit: main_ecu
  - name: map
    entity: MapDummy.node
    compute_unit: dummy_ecu_1
  - name: localization
    entity: LocalizationDummy.node
    compute_unit: dummy_ecu_1
  - name: object_recognition
    entity: PerceptionA.module
    path: /perception/object_recognition
    compute_unit: main_ecu
    parameter_set: [PerceptionModuleA.parameter_set]
  - name: planning
    entity: PlanningDummy.node
    compute_unit: dummy_ecu_2

node_groups:
  - name: pointcloud_container
    type: ros2_component_container_mt
    nodes:
      - /sensing/lidar/*
      - /perception/object_recognition/detector_a1/node_detector
      - /perception/object_recognition/detector_a2/node_detector

connections:
  - - object_recognition.subscriber.pointcloud
    - lidar.publisher.concatenated/pointcloud
  - - map.publisher.vector_map
    - planning.subscriber.lanelet_map
  - - object_recognition.publisher.objects
    - planning.subscriber.predicted_objects
  - - lidar.publisher.concatenated/pointcloud
    - localization.subscriber.pointcloud
  - - map.publisher.vector_map
    - localization.subscriber.lanelet_map
  - - object_recognition.subscriber.vector_map
    - map.publisher.vector_map

# mode configuration
simulation:
  override:
    components:
      - name: object_recognition
        entity: PerceptionB.module
        path: /perception/object_recognition
        compute_unit: main_ecu
        parameter_set: [PerceptionModuleABuild.parameter_set]
    node_groups:
      - name: pointcloud_container
        type: ros2_component_container_mt
        nodes:
          - /sensing/lidar/*
          - /perception/object_recognition/detector_a1/node_detector
