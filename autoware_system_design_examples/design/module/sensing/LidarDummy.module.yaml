autoware_system_design_format: 0.3.0

name: LidarDummy.module

instances:
  - name: lidar_top
    entity: LidarDummyDriver.node
  - name: lidar_left
    entity: LidarDummyDriver.node
  - name: lidar_right
    entity: LidarDummyDriver.node
  - name: lidar_rear
    entity: LidarDummyDriver.node
  - name: lidar_concatenate
    entity: ConcatenatePointcloudDummy.node

subscribers: []
publishers:
  - name: top/pointcloud
  - name: left/pointcloud
  - name: right/pointcloud
  - name: rear/pointcloud
  - name: concatenated/pointcloud

connections:
  # individual lidar outputs
  - - lidar_top.publisher.pointcloud
    - publisher.top/pointcloud
  - - lidar_left.publisher.pointcloud
    - publisher.left/pointcloud
  - - lidar_right.publisher.pointcloud
    - publisher.right/pointcloud
  - - lidar_rear.publisher.pointcloud
    - publisher.rear/pointcloud
  # concatenated lidar output
  - - lidar_top.publisher.pointcloud
    - lidar_concatenate.subscriber.input1
  - - lidar_left.publisher.pointcloud
    - lidar_concatenate.subscriber.input2
  - - lidar_right.publisher.pointcloud
    - lidar_concatenate.subscriber.input3
  - - lidar_rear.publisher.pointcloud
    - lidar_concatenate.subscriber.input4
  - - lidar_concatenate.publisher.output
    - publisher.concatenated/pointcloud
