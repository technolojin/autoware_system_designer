autoware_system_design_format: 0.3.0

name: FilterA.node

package:
  name: autoware_perception_dummy_nodes
  provider: dummy

launch:
  plugin: autoware::perception_dummy_nodes::FilterA
  executable: filter_a_node
  node_output: screen

# interfaces
subscribers:
  - name: ros_transform
    message_type: tf2_msgs/msg/TFMessage
    global: /tf
  - name: vector_map
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: objects
    message_type: autoware_perception_msgs/msg/DetectedObjects

publishers:
  - name: objects
    message_type: autoware_perception_msgs/msg/DetectedObjects
    qos:
      reliability: reliable
      durability: transient_local

param_files:
  - name: filtering_range_param
    default: path/to/filtering_range_param.yaml

param_values: []

# processes
processes:
  - name: filter
    trigger_conditions:
      - and:
          - on_input: objects
          - once: vector_map
    outcomes:
      - to_output: objects
