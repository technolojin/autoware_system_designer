<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Autoware System Designer</title>
    <script src="config.js"></script>
    <script src="diagram_base.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js"
      integrity="sha384-KO35c6PFq7tFxAEx6FtATwL9vOBOmCzQYr7GM0iTr3oO22s7Jc9OkclOH4AV7jwK"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"
      integrity="sha384-WmdflGW9aGfoBdHc4rRyWzYuAjEmDwMdGdiPNacbwfGKxBW/SO6guzuQ76qjnSlr"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"
      integrity="sha384-yc/c2Lk1s2V2ir1rxvjo8YyVD9PlOlYTqpNr3Wm1WIuAA30GlDYNx6U5104OiavY"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading...</div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <a href="#" class="home-link">&larr; Back to Systems</a>
        <span class="header-link-sep">|</span>
        <a href="#" class="launcher-link" id="launcher-link">Launch commands</a>
        <h1></h1>
        <div class="package-info"></div>
        <button id="settings-btn" title="Settings" aria-label="Open settings">
          <svg
            width="15"
            height="15"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>

      <div id="mode-selector-section">
        <label for="mode-selector">System Mode:</label>
        <select id="mode-selector">
          <!-- Populated by JS -->
        </select>
      </div>

      <div id="diagram-list">
        <div class="section-title">Diagram Types</div>
        <!-- Populated by JS -->
      </div>

      <div id="info-panel">
        <!-- Node details will be populated here -->
      </div>
    </div>

    <!-- Settings Popup -->
    <div id="settings-overlay"></div>
    <div
      id="settings-popup"
      role="dialog"
      aria-modal="true"
      aria-label="Settings"
    >
      <div id="settings-popup-header">
        <span>Settings</span>
        <button id="settings-close" aria-label="Close settings">
          &#x2715;
        </button>
      </div>
      <div class="settings-row">
        <label for="dark-mode-switch">Dark Mode</label>
        <div class="toggle-switch" id="dark-mode-switch"></div>
      </div>
      <div class="settings-row">
        <label for="editor-selector">Editor</label>
        <select id="editor-selector">
          <option value="vscode">VS Code</option>
          <option value="vscode-insiders">VS Code Insiders</option>
          <option value="cursor">Cursor</option>
          <option value="windsurf">Windsurf</option>
          <option value="idea">IntelliJ IDEA</option>
          <option value="clion">CLion</option>
          <option value="pycharm">PyCharm</option>
          <option value="webstorm">WebStorm</option>
          <option value="subl">Sublime Text</option>
        </select>
      </div>
    </div>

    <div id="sidebar-resizer"></div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <div
        id="diagram-container"
        style="width: 100%; height: 100%; position: relative"
      ></div>
    </div>

    <script>
      // Check if config exists
      if (typeof deploymentConfig === "undefined") {
        console.error(
          "deploymentConfig is not defined. Make sure config.js is loaded.",
        );
        alert("Error: Configuration not loaded.");
      }

      const {
        deploymentName,
        availableDiagramTypes,
        availableModes,
        defaultDiagramType,
        defaultMode,
        packageName,
        systemsIndexPath,
        editorScheme: defaultEditorScheme = "vscode",
        systemDefinitionFile = "",
      } = deploymentConfig;

      // --- Editor URL helper ---
      // Reads preference from localStorage (set by editor selector in sidebar).
      // Falls back to deploymentConfig.editorScheme, then "vscode".
      function getEditorUrl(fp, line) {
        const scheme =
          localStorage.getItem("editorScheme") || defaultEditorScheme;
        switch (scheme) {
          case "idea":
          case "clion":
          case "pycharm":
          case "webstorm":
            return `${scheme}://open?file=${encodeURIComponent(fp)}&line=${line}`;
          case "subl":
            return `subl://open?url=file://${encodeURIComponent(fp)}&line=${line}`;
          default:
            // vscode, vscode-insiders, cursor, windsurf — all share the same scheme
            return `${scheme}://file/${encodeURIComponent(fp)}:${line}`;
        }
      }

      // Optional callback for diagram modules when theme changes (set by theme.js)
      window.__onThemeChange = function () {
        if (
          currentDiagramModule &&
          typeof currentDiagramModule.updateTheme === "function"
        ) {
          currentDiagramModule.updateTheme();
        }
      };

      // Parse URL parameters
      function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      // Sync selection state to URL without triggering a reload
      function updateUrlParams() {
        const url = new URL(window.location.href);
        url.searchParams.set("diagram", currentDiagramType);
        url.searchParams.set("mode", currentMode);
        history.replaceState(null, "", url.toString());
      }

      // State — restored from URL params when present
      let currentDiagramType = getUrlParameter("diagram") || defaultDiagramType;
      let currentMode = getUrlParameter("mode") || defaultMode;
      let currentDiagramData = null;
      let nodeDiagramInstance = null;
      let sequenceDiagramInstance = null;

      // Data store for interactions (decoupled from ELK graph)
      let elementData = new Map();

      // DOM elements
      const modeSelect = document.getElementById("mode-selector");
      const diagramContainer = document.getElementById("diagram-container");
      const loading = document.getElementById("loading");
      const infoPanel = document.getElementById("info-panel");
      const darkModeToggle = document.getElementById("dark-mode-switch");

      // Current diagram module instance
      let currentDiagramModule = null;

      // DOM element for diagram content
      const diagramContent = document.getElementById("diagram-content");

      function showLoading(show, text = "Loading...") {
        loading.style.display = show ? "flex" : "none";
        document.getElementById("loading-text").textContent = text;
      }

      function updateInfoPanel(data, type) {
        // Helper to check if empty
        const isEmpty = (val) =>
          !val ||
          (Array.isArray(val) && val.length === 0) ||
          (typeof val === "object" && Object.keys(val).length === 0);

        let html = "";

        // --- Topic Block ---
        if (data.topic) {
          let displayValue = data.topic;
          if (Array.isArray(data.topic)) {
            displayValue = "/" + data.topic.join("/");
          }

          html += `<div class="info-card">
                    <div class="info-title">Topic</div>
                    <div class="info-row">
                        <span class="info-value" style="width: 100%; word-break: break-all;">${displayValue}</span>
                    </div>
                </div>`;
        }

        // --- Source File Block --- (built via DOM API to avoid HTML injection)

        // --- 1. Info Block ---
        let infoHtml = "";
        // Fields explicitly excluded from Info block or handled in other blocks
        const ignoredKeys = [
          "id",
          "children",
          "edges",
          "ports",
          "layoutOptions",
          "width",
          "height",
          "x",
          "y",
          "source",
          "target",
          "sections",
          "vis_guide",
          "source_file",
          "in_ports",
          "out_ports",
          "parameters",
          "topic",
        ];

        let hasInfo = false;
        for (const [key, value] of Object.entries(data)) {
          if (ignoredKeys.includes(key)) continue;

          let displayValue = value;

          if (typeof value === "object" && value !== null) {
            if (Array.isArray(value)) displayValue = "[" + value.length + "]";
            else displayValue = "{...}";
          }

          infoHtml += `<div class="info-row">
                    <span class="info-label">${key}:</span>
                    <span class="info-value">${displayValue}</span>
                </div>`;
          hasInfo = true;
        }

        if (hasInfo) {
          html += `<div class="info-card">
                    <div class="info-title">Info</div>
                    ${infoHtml}
                </div>`;
        }

        // --- 2. Interface Block ---
        const inPorts = data.in_ports || [];
        const outPorts = data.out_ports || [];

        if (inPorts.length > 0 || outPorts.length > 0) {
          let interfaceHtml = "";

          if (inPorts.length > 0) {
            interfaceHtml += `<div style="margin-bottom: 15px;">
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 4px; margin-bottom: 8px;">Input Ports</div>`;
            inPorts.forEach((port) => {
              const name = port.name || "Unnamed";
              const type = port.msg_type || port.type || "";
              interfaceHtml += `<div style="margin-bottom: 8px; font-size: 13px;">
                            <div style="font-weight: 500; color: var(--text-primary);">${name}</div>
                            ${type ? `<div style="color: var(--text-muted); font-size: 11px; font-family: 'Consolas', monospace; margin-top: 1px;">${type}</div>` : ""}
                        </div>`;
            });
            interfaceHtml += `</div>`;
          }

          if (outPorts.length > 0) {
            interfaceHtml += `<div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 4px; margin-bottom: 8px;">Output Ports</div>`;
            outPorts.forEach((port) => {
              const name = port.name || "Unnamed";
              const type = port.msg_type || port.type || "";
              interfaceHtml += `<div style="margin-bottom: 8px; font-size: 13px;">
                            <div style="font-weight: 500; color: var(--text-primary);">${name}</div>
                            ${type ? `<div style="color: var(--text-muted); font-size: 11px; font-family: 'Consolas', monospace; margin-top: 1px;">${type}</div>` : ""}
                        </div>`;
            });
            interfaceHtml += `</div>`;
          }

          html += `<div class="info-card">
                    <div class="info-title">Interface</div>
                    ${interfaceHtml}
                </div>`;
        }

        // --- 3. Parameter Block ---
        const params = data.parameters;
        if (!isEmpty(params)) {
          // Source type → { label, text color, bg rgba, border rgba }
          const paramTypeStyle = {
            DEFAULT: {
              label: "default",
              color: "#888888",
              bg: "rgba(136,136,136,0.12)",
              border: "rgba(136,136,136,0.35)",
            },
            DEFAULT_FILE: {
              label: "def-file",
              color: "#888888",
              bg: "rgba(136,136,136,0.12)",
              border: "rgba(136,136,136,0.35)",
            },
            OVERRIDE: {
              label: "override",
              color: "#d4890a",
              bg: "rgba(212,137,10,0.12)",
              border: "rgba(212,137,10,0.40)",
            },
            OVERRIDE_FILE: {
              label: "ovr-file",
              color: "#d4890a",
              bg: "rgba(212,137,10,0.12)",
              border: "rgba(212,137,10,0.40)",
            },
            MODE: {
              label: "mode",
              color: "#1e88e5",
              bg: "rgba(30,136,229,0.12)",
              border: "rgba(30,136,229,0.40)",
            },
            MODE_FILE: {
              label: "mode-file",
              color: "#1e88e5",
              bg: "rgba(30,136,229,0.12)",
              border: "rgba(30,136,229,0.40)",
            },
            GLOBAL: {
              label: "global",
              color: "#8e24aa",
              bg: "rgba(142,36,170,0.12)",
              border: "rgba(142,36,170,0.40)",
            },
          };

          function escapeHtml(str) {
            return String(str)
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#39;");
          }

          function buildSourceBadge(ptype, source) {
            const style = paramTypeStyle[ptype] || {
              label: (ptype || "").toLowerCase() || "—",
              color: "#888",
              bg: "rgba(136,136,136,0.12)",
              border: "rgba(136,136,136,0.35)",
            };
            const badgeStyle =
              `display:inline-block;font-size:10px;font-weight:600;` +
              `color:${style.color};background:${style.bg};border:1px solid ${style.border};` +
              `border-radius:3px;padding:1px 5px;font-family:'Consolas',monospace;` +
              `vertical-align:middle;white-space:nowrap;`;

            if (source && source.file_path) {
              const fp = source.file_path;
              const line = source.line || 1;
              const editorUrl = getEditorUrl(fp, line);
              return `<a href="${editorUrl}" title="${escapeHtml(fp)}:${escapeHtml(line)}" style="${badgeStyle}cursor:pointer;text-decoration:none;">${escapeHtml(style.label)}</a>`;
            }
            return `<span style="${badgeStyle}" title="${escapeHtml(ptype)}">${escapeHtml(style.label)}</span>`;
          }

          let parameterHtml = `<div>`;

          if (typeof params === "object" && !Array.isArray(params)) {
            for (const [pName, pVal] of Object.entries(params)) {
              let displayVal = pVal;
              if (typeof pVal === "object") displayVal = JSON.stringify(pVal);
              parameterHtml += `<div style="padding: 6px 0; border-bottom: 1px solid var(--border-color);">
                            <div style="font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 2px; word-break: break-all;">${escapeHtml(pName)}</div>
                            <div style="font-family: 'Consolas', monospace; font-size: 12px; color: var(--text-primary); word-break: break-all; padding-left: 8px;">${escapeHtml(String(displayVal))}</div>
                        </div>`;
            }
          } else if (Array.isArray(params)) {
            params.forEach((p) => {
              let displayVal = p.value;
              if (typeof displayVal === "object")
                displayVal = JSON.stringify(displayVal);

              const badge = buildSourceBadge(p.parameter_type, p.source);

              parameterHtml += `<div style="padding: 6px 0; border-bottom: 1px solid var(--border-color);">
                              <div style="display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:2px;">
                                <span style="font-size:12px;font-weight:500;color:var(--text-secondary);word-break:break-all;flex:1;">${escapeHtml(p.name)} ${badge}</span>
                                <span style="font-family:'Consolas',monospace;font-size:12px;color:var(--text-primary);word-break:break-all;text-align:right;flex-shrink:0;">${escapeHtml(String(displayVal))}</span>
                              </div>
                          </div>`;
            });
          }
          parameterHtml += `</div>`;

          html += `<div class="info-card">
                    <div class="info-title">Parameter</div>
                    ${parameterHtml}
                </div>`;
        }

        // Fallback
        if (!html) {
          html = `<div class="info-card"><div class="info-title">${type} Details</div><div class="info-row">No details available</div></div>`;
        }

        infoPanel.innerHTML = html;

        if (data.source_file) {
          const fp = data.source_file;
          const shortName = fp.split("/").pop();
          const editorUrl = getEditorUrl(fp, 1);

          const a = document.createElement("a");
          a.setAttribute("href", editorUrl);
          a.setAttribute("title", fp);
          a.style.cssText =
            "color:var(--link-color,#1e88e5);text-decoration:none;word-break:break-all;font-size:13px;font-family:'Consolas',monospace;";
          a.textContent = shortName;

          const row = document.createElement("div");
          row.className = "info-row";
          row.appendChild(a);

          const titleEl = document.createElement("div");
          titleEl.className = "info-title";
          titleEl.textContent = "Source";

          const card = document.createElement("div");
          card.className = "info-card";
          card.appendChild(titleEl);
          card.appendChild(row);

          infoPanel.insertBefore(card, infoPanel.firstChild);
        }
      }

      function updateDiagramTypeSelection() {
        // Update active state of diagram type items
        document.querySelectorAll(".diagram-type-item").forEach((item) => {
          if (item.getAttribute("data-type") === currentDiagramType) {
            item.classList.add("active");
          } else {
            item.classList.remove("active");
          }
        });
      }

      async function loadDiagramModule(diagramType, mode) {
        // Destroy current diagram module if it exists
        if (currentDiagramModule) {
          currentDiagramModule.destroy();
          currentDiagramModule = null;
        }

        // Clear container and remove any diagram-specific styles/classes
        diagramContainer.innerHTML = "";
        diagramContainer.className = ""; // Clear any classes applied to the container

        // Remove any diagram-specific styles from document head
        const styleIdsToRemove = [
          "logic-diagram-interaction-styles",
          "sequence-diagram-interaction-styles",
          "node-diagram-interaction-styles",
        ];
        styleIdsToRemove.forEach((styleId) => {
          const styleElement = document.getElementById(styleId);
          if (styleElement) {
            styleElement.remove();
          }
        });

        // Clear any global highlight classes that might persist
        document.querySelectorAll(".highlighted").forEach((el) => {
          el.classList.remove("highlighted");
        });
        document.querySelectorAll(".port-highlighted").forEach((el) => {
          el.classList.remove("port-highlighted");
        });
        document.querySelectorAll(".line-highlight").forEach((el) => {
          el.classList.remove("line-highlight");
        });
        document.querySelectorAll(".line-hover").forEach((el) => {
          el.classList.remove("line-hover");
        });

        try {
          // Load the appropriate module script if not already loaded
          const moduleUrl = `${diagramType}.js`;
          await loadScript(moduleUrl);

          // Create module instance
          const ModuleClass =
            diagramType === "node_diagram"
              ? window.NodeDiagramModule
              : diagramType === "sequence_diagram"
                ? window.SequenceDiagramModule
                : diagramType === "logic_diagram"
                  ? window.LogicDiagramModule
                  : null;

          if (!ModuleClass) {
            throw new Error(
              `Module class not found for diagram type: ${diagramType}. Make sure ${moduleUrl} is properly generated.`,
            );
          }

          currentDiagramModule = new ModuleClass(diagramContainer, {
            mode: mode,
            deployment: deploymentName,
            onInfoUpdate: (data, type) => {
              updateInfoPanel(data, type);
            },
          });

          // Show info panel for node diagrams, hide for sequence diagrams
          infoPanel.style.display =
            diagramType === "node_diagram" ? "block" : "none";
        } catch (error) {
          console.error("Error loading diagram module:", error);
          const errorMessage = error.message || "Unknown error occurred";
          diagramContainer.innerHTML = `<div style="display: flex; justify-content: center; align-items: center; height: 100%; color: var(--error-color); font-family: Arial, sans-serif;">Error loading diagram: ${errorMessage}</div>`;
        }
      }

      async function loadDiagram(diagramType, mode) {
        showLoading(true, `Loading ${diagramType.replace("_", " ")}...`);

        try {
          await loadDiagramModule(diagramType, mode);
        } catch (error) {
          console.error("Error loading diagram:", error);
          alert(`Error loading diagram: ${error.message}`);
        } finally {
          showLoading(false);
        }
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          // Check if script is already loaded
          const existingScript = document.querySelector(`script[src="${src}"]`);
          if (existingScript) {
            resolve();
            return;
          }

          const script = document.createElement("script");
          script.src = src;
          script.onload = () => {
            console.log("Script loaded successfully:", src);
            resolve();
          };
          script.onerror = (error) => {
            console.error("Failed to load script:", src, error);
            reject(error);
          };
          document.head.appendChild(script);
        });
      }

      function initializeUI() {
        document.title = `Autoware System Designer - ${deploymentName}`;

        const backLink = document.querySelector(".home-link");
        if (backLink) backLink.href = systemsIndexPath;

        const launcherLink = document.getElementById("launcher-link");
        if (launcherLink)
          launcherLink.href = `${deploymentName}_launch_commands.html`;

        const headerTitle = document.querySelector("#sidebar-header h1");
        if (headerTitle) headerTitle.textContent = deploymentName;

        const packageInfoDiv = document.querySelector(".package-info");
        if (packageInfoDiv) {
          packageInfoDiv.textContent = `Package: ${packageName}`;
          if (systemDefinitionFile) {
            const editorUrl = getEditorUrl(systemDefinitionFile, 1);
            const shortName = systemDefinitionFile.split("/").pop();
            const link = document.createElement("a");
            link.href = editorUrl;
            link.title = systemDefinitionFile;
            link.textContent = shortName;
            link.style.cssText =
              "display:block;font-size:12px;color:var(--link-color,#1e88e5);text-decoration:none;word-break:break-all;font-family:'Consolas',monospace;margin-top:2px;";
            packageInfoDiv.appendChild(link);
          }
        }

        // Populate mode selector
        modeSelect.innerHTML = "";
        availableModes.forEach((mode) => {
          const option = document.createElement("option");
          option.value = mode;
          option.textContent = mode;
          modeSelect.appendChild(option);
        });
        // Restore selection from URL (currentMode already accounts for URL param)
        modeSelect.value = currentMode;

        // Populate diagram types
        const diagramList = document.getElementById("diagram-list");
        diagramList.innerHTML =
          '<div class="section-title">Diagram Types</div>';
        availableDiagramTypes.forEach((type) => {
          const a = document.createElement("a");
          a.className = `diagram-type-item ${type === defaultDiagramType ? "active" : ""}`;
          a.href = "#";
          a.dataset.type = type;
          // format title: replace _ with space and title case
          const title = type
            .replace(/_/g, " ")
            .replace(/\b\w/g, (l) => l.toUpperCase());
          a.textContent = title;
          diagramList.appendChild(a);
        });

        // Bind event listeners for diagram types
        document.querySelectorAll(".diagram-type-item").forEach((item) => {
          item.addEventListener("click", (e) => {
            e.preventDefault();
            currentDiagramType = item.getAttribute("data-type");
            updateUrlParams();
            updateDiagramTypeSelection();
            loadDiagram(currentDiagramType, currentMode);
          });
        });

        // Mode selector event listener
        modeSelect.addEventListener("change", (e) => {
          currentMode = e.target.value;
          updateUrlParams();
          loadDiagram(currentDiagramType, currentMode);
        });

        // Editor selector — persists choice in localStorage
        const editorSelect = document.getElementById("editor-selector");
        const savedScheme =
          localStorage.getItem("editorScheme") || defaultEditorScheme;
        if (editorSelect) {
          editorSelect.value = savedScheme;
          editorSelect.addEventListener("change", (e) => {
            localStorage.setItem("editorScheme", e.target.value);
          });
        }
      }

      // Dark mode listener (theme.js provides toggleDarkMode)
      darkModeToggle.addEventListener("click", function () {
        window.toggleDarkMode();
      });

      // Settings popup
      const settingsBtn = document.getElementById("settings-btn");
      const settingsOverlay = document.getElementById("settings-overlay");
      const settingsPopup = document.getElementById("settings-popup");
      const settingsClose = document.getElementById("settings-close");

      function openSettings() {
        settingsPopup.classList.add("open");
        settingsOverlay.classList.add("open");
      }
      function closeSettings() {
        settingsPopup.classList.remove("open");
        settingsOverlay.classList.remove("open");
      }

      settingsBtn.addEventListener("click", openSettings);
      settingsClose.addEventListener("click", closeSettings);
      settingsOverlay.addEventListener("click", closeSettings);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSettings();
      });

      // Resizer functionality
      function initializeResizer() {
        const sidebar = document.getElementById("sidebar");
        const resizer = document.getElementById("sidebar-resizer");
        let isResizing = false;

        resizer.addEventListener("mousedown", (e) => {
          isResizing = true;
          resizer.classList.add("resizing");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });

        document.addEventListener("mousemove", (e) => {
          if (!isResizing) return;

          // Calculate new width (constrain between 150px and 700px)
          const newWidth = Math.min(Math.max(e.clientX, 150), 700);
          sidebar.style.width = `${newWidth}px`;

          // Resize diagram if needed (trigger resize event)
          if (
            currentDiagramModule &&
            typeof currentDiagramModule.fitToScreen === "function"
          ) {
            // Optional: re-fit or update layout
          }
        });

        document.addEventListener("mouseup", () => {
          if (isResizing) {
            isResizing = false;
            resizer.classList.remove("resizing");
            document.body.style.cursor = "";
            document.body.style.userSelect = "";

            // Trigger window resize event to update diagram size/layout
            window.dispatchEvent(new Event("resize"));
          }
        });
      }

      // Initialize
      window.addEventListener("load", () => {
        // Initialize UI from config
        initializeUI();

        // Write initial URL params so the current state is preserved on refresh
        updateUrlParams();

        // Initialize theme (uses localStorage so mode persists across pages)
        window.initializeTheme();

        // Initialize resizer
        initializeResizer();

        // Wait a bit more to ensure all scripts are fully loaded
        setTimeout(() => {
          updateDiagramTypeSelection();
          loadDiagram(currentDiagramType, currentMode);
        }, 100);
      });
    </script>
  </body>
</html>
